<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page Selector</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 30px;
            color: #333;
        }
        .button {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }
        .button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .button.disabled {
            background-color: #a0a0a0;
            cursor: not-allowed;
        }
         .button.disabled:hover {
            background-color: #a0a0a0;
            transform: none;
        }
        .info {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Select Game</h1>
        
        <a href="oleh simulator/index2.html" id="openMeBtn" class="button disabled">Oleh Simulator</a>
        
        <a href="catch_trent/index3.html" class="button">Catch Thom</a>
        <p id="unlockMessage" class="info">Score 10 points in the game to unlock the "Oleh Simulator"</p>
    </div>
    <script src="catch_trent/index3.html"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const openMeBtn = document.getElementById('openMeBtn');
            const unlockMessage = document.getElementById('unlockMessage');

            
            function getQueryParam(param) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param);
            }

            const score = parseInt(getQueryParam('score'));

            if (score && score >= 10) {
                openMeBtn.classList.remove('disabled');
                unlockMessage.textContent = 'You have unlocked the "Oleh Simulator"!';
                openMeBtn.href = 'oleh simulator/index2.html'; 
            } else {
                openMeBtn.addEventListener('click', (e) => {
                    if (openMeBtn.classList.contains('disabled')) {
                        e.preventDefault();
                        alert('You must score at least 10 points in the game to open this page.');
                    }
                });
            }
        });
    </script>


</body>
</html>
